name: grok2api

services:
  grok2api:
    container_name: grok2api
    image: "${GROK2API_IMAGE:-ghcr.io/jackma15115/grok2api:latest}"
    depends_on:
      warp:
        condition: service_started
      flaresolverr:
        condition: service_healthy
    ports:
      - "${GROK2API_PORT:-8000}:8000"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - "${GROK2API_CONFIG:-./config.yaml}:/run/grok2api/config.yaml:ro"
      - grok2api-data:/app/data
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true

  statsig-signer:
    container_name: statsig-signer
    image: "${STATSIG_SIGNER_IMAGE:-ghcr.io/jackma15115/grok2api-statsig-signer:latest}"
    depends_on:
      warp:
        condition: service_started
      flaresolverr:
        condition: service_healthy
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      SIGNER_TARGET_URL: "${SIGNER_TARGET_URL:-https://grok.com/}"
      SIGNER_FLARESOLVERR_URL: "${SIGNER_FLARESOLVERR_URL:-http://flaresolverr:8191}"
      SIGNER_FLARESOLVERR_TIMEOUT_MS: "${SIGNER_FLARESOLVERR_TIMEOUT_MS:-60000}"
      SIGNER_COOKIE: "${SIGNER_COOKIE:-}"
      SIGNER_USER_AGENT: "${SIGNER_USER_AGENT:-}"
      SIGNER_PROXY_URL: "${SIGNER_PROXY_URL:-socks5://warp:1080}"
      SIGNER_BROWSER_EXECUTABLE_PATH: "${SIGNER_BROWSER_EXECUTABLE_PATH:-}"
      SIGNER_REFRESH_INTERVAL_MS: "${SIGNER_REFRESH_INTERVAL_MS:-1800000}"
    expose:
      - "8787"
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true

  warp:
    container_name: warp
    image: caomingjun/warp:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:1080:1080"
    environment:
      WARP_SLEEP: 2
    cap_add:
      - NET_ADMIN

  flaresolverr:
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      LOG_LEVEL: "${FLARESOLVERR_LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8191/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

volumes:
  grok2api-data:
