name: GHCR Image

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the image to GHCR
        required: false
        default: false
        type: boolean

concurrency:
  group: ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Vet backend
        working-directory: backend
        run: go vet ./...

      - name: Verify Swagger document
        run: |
          make swagger
          git diff --exit-code -- backend/docs/docs.go backend/docs/swagger.json backend/docs/swagger.yaml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: pnpm lint

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Install Statsig signer dependencies
        working-directory: statsig-signer
        run: npm ci

      - name: Install Statsig signer Chromium
        working-directory: statsig-signer
        run: npx playwright install --with-deps chromium

      - name: Test Statsig signer
        working-directory: statsig-signer
        shell: bash
        run: |
          browser_path=$(node -e "const { chromium } = require('playwright'); process.stdout.write(chromium.executablePath())")
          SIGNER_TEST_BROWSER="$browser_path" npm test

  check_ghcr_image:
    name: Build ${{ matrix.image }} image (${{ matrix.arch }})
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.publish != true)
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: grok2api
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
            context: .
            file: ./Dockerfile
          - image: grok2api
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            context: .
            file: ./Dockerfile
          - image: statsig-signer
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
            context: ./statsig-signer
            file: ./statsig-signer/Dockerfile
          - image: statsig-signer
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            context: ./statsig-signer
            file: ./statsig-signer/Dockerfile
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          provenance: false
          sbom: false

  build_ghcr_image:
    name: Publish ${{ matrix.image }} image (${{ matrix.arch }})
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    needs: verify
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: grok2api
            suffix: ""
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
            context: .
            file: ./Dockerfile
          - image: grok2api
            suffix: ""
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            context: .
            file: ./Dockerfile
          - image: statsig-signer
            suffix: -statsig-signer
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
            context: ./statsig-signer
            file: ./statsig-signer/Dockerfile
          - image: statsig-signer
            suffix: -statsig-signer
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            context: ./statsig-signer
            file: ./statsig-signer/Dockerfile
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image name
        id: image
        shell: bash
        run: |
          image_name=$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/$image_name${{ matrix.suffix }}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch,suffix=-${{ matrix.arch }}
            type=ref,event=tag,suffix=-${{ matrix.arch }}
            type=raw,value=main-${{ matrix.arch }},enable=${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.ref_name }}-${{ matrix.arch }},enable=${{ github.event_name == 'workflow_dispatch' && github.ref_type == 'tag' }}
            type=raw,value=latest-${{ matrix.arch }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }},mode=max
          provenance: mode=max
          sbom: true

  merge:
    name: Merge ${{ matrix.image }} image
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    needs:
      - build_ghcr_image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: grok2api
            suffix: ""
          - image: statsig-signer
            suffix: -statsig-signer
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image name
        id: image
        shell: bash
        run: |
          image_name=$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/$image_name${{ matrix.suffix }}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=main,enable=${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.ref_name }},enable=${{ github.event_name == 'workflow_dispatch' && github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list
        shell: bash
        run: |
          jq -cr '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON" | while read -r tag; do
            docker buildx imagetools create \
              -t "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64"
          done

      - name: Inspect image
        run: docker buildx imagetools inspect "${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }}"
