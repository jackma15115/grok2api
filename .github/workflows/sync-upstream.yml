name: Sync Upstream

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

env:
  TARGET_BRANCH: main
  UPSTREAM_REPOSITORY: chenyme/grok2api
  UPSTREAM_BRANCH: main

jobs:
  sync:
    name: Merge upstream
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"

      - name: Detect new upstream tags
        id: tags
        shell: bash
        run: |
          mapfile -t new_tags < <(
            comm -13 \
              <(git ls-remote --tags --refs origin | awk '{ sub("refs/tags/", "", $2); print $2 }' | sort -u) \
              <(git ls-remote --tags --refs upstream | awk '{ sub("refs/tags/", "", $2); print $2 }' | sort -u)
          )
          if ((${#new_tags[@]} == 0)); then
            echo "tags=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s\n' "${new_tags[@]}" > /tmp/new-upstream-tags.txt
          {
            echo "tags<<EOF"
            cat /tmp/new-upstream-tags.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Fetch upstream
        run: git fetch upstream "${UPSTREAM_BRANCH}" --tags

      - name: Merge upstream branch
        id: merge
        shell: bash
        run: |
          before="$(git rev-parse HEAD)"
          git merge --no-edit "upstream/${UPSTREAM_BRANCH}"
          after="$(git rev-parse HEAD)"
          if [[ "$before" != "$after" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git push origin "HEAD:${TARGET_BRANCH}"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date."
          fi

      - name: Push new tags
        if: steps.tags.outputs.tags != ''
        shell: bash
        run: |
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            git push origin "refs/tags/${tag}:refs/tags/${tag}"
          done <<< "${{ steps.tags.outputs.tags }}"

      - name: Trigger Docker build for main
        if: steps.merge.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run .github/workflows/ghcr-image.yml --ref "${TARGET_BRANCH}" -f publish=true

      - name: Trigger Docker builds for new tags
        if: steps.tags.outputs.tags != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            gh workflow run .github/workflows/ghcr-image.yml --ref "$tag" -f publish=true
          done <<< "${{ steps.tags.outputs.tags }}"
